name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  versioning:
    name: CI / versioning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Validate branch naming
        run: >
          if [ -f scripts/validate-versioning.mjs ]; then
            node scripts/validate-versioning.mjs;
          else
            echo "No versioning script yet.";
          fi

  content:
    name: CI / content-validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.0.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate frontmatter schema
        run: >
          if [ -d content/en ] && [ -f scripts/validate-frontmatter.mjs ]; then
            node scripts/validate-frontmatter.mjs;
          else
            echo "No content to validate yet.";
          fi

      - name: Verify content hashes
        run: >
          if [ -f scripts/hash-content.mjs ] && [ -f reports/content_hashes.sha256 ]; then
            node scripts/hash-content.mjs --verify;
          else
            echo "No hash verification configured.";
          fi

  lint:
    name: CI / lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.0.0 --activate

      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  test:
    name: CI / test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.0.0 --activate

      - run: pnpm install --frozen-lockfile
      - run: pnpm test || echo "No tests defined yet."

  build:
    name: CI / build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.0.0 --activate

      - run: pnpm install --frozen-lockfile
      - run: pnpm build